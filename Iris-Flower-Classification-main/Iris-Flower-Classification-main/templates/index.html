<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iris Flower Classification</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>🌸 Iris Flower Classification</h1>

    <p>Predict the species of an Iris flower using Machine Learning</p>

    <form action="/predict" method="POST">

        <input type="number" step="any" name="sepal_length" placeholder="Sepal Length" required>

        <input type="number" step="any" name="sepal_width" placeholder="Sepal Width" required>

        <input type="number" step="any" name="petal_length" placeholder="Petal Length" required>

        <input type="number" step="any" name="petal_width" placeholder="Petal Width" required>

        <button type="submit">
            Predict Flower
        </button>

    </form>

    {% if prediction %}
    <div class="result">
        🌼 Predicted Flower:
        <strong>{{ prediction }}</strong>
    </div>
    {% endif %}

</div>

</body>
</html>
